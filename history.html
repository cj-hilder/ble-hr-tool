<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Session History – HR Pacer</title>
    <link rel="stylesheet" href="history.css">
</head>
<body>

<header>
    <a href="index.html">&#8592;</a>
    <h1>Session History</h1>
    <span class="session-count" id="sessionCount"></span>
    <button id="menuBtn" title="More options">&#8942;</button>
    <div id="menuDropdown">
        <div class="menu-item" id="menuExport">
            <span class="menu-icon">&#8593;</span> Export
        </div>
        <div class="menu-item" id="menuImport">
            <span class="menu-icon">&#8595;</span> Import
        </div>
    </div>
</header>

<!-- Error modal -->
<div id="errorModal">
    <div id="errorModalBox">
        <div id="errorModalTitle"></div>
        <div id="errorModalMsg"></div>
        <button id="errorModalOk">OK</button>
    </div>
</div>

<!-- Hidden file input for import -->
<input type="file" id="importFileInput" accept=".json" style="display:none">

<!-- Toast notification -->
<div id="toastMsg"></div>

<div id="filterBar">
    <div id="filterLabel">Filter by activity</div>
    <div id="filterChips"></div>
</div>

<div id="emptyState">
    <p>No sessions saved yet.</p>
    <small>Complete a session and tap "Save session" to start building your history.</small>
</div>

<div id="chartsSection">
    <div class="charts-grid">
        <div class="chart-card"><h3>% Active Time</h3><canvas id="chartPctActive" height="120"></canvas></div>
        <div class="chart-card"><h3>Avg Lag (sec)</h3><canvas id="chartAvgLag" height="120"></canvas></div>
        <div class="chart-card"><h3>Avg Peak HR</h3><canvas id="chartAvgPeak" height="120"></canvas></div>
        <div class="chart-card"><h3>Session Length (min)</h3><canvas id="chartSessionLen" height="120"></canvas></div>
        <div class="chart-card" id="chartAvgRfbCard" style="display:none;"><h3>Avg Resonance Index</h3><canvas id="chartAvgRfb" height="120"></canvas></div>
        <div class="chart-card" id="chartHrvIndexCard" style="display:none;"><h3>HRV Index</h3><canvas id="chartHrvIndex" height="120"></canvas></div>
    </div>
    <div id="noResults">No sessions match this filter.</div>
    <div id="sessionsList"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="history.js"></script>
</body>
</html>
