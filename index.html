<!DOCTYPE html>
<html>
<head>
    <title>Polar Heart Rate Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            margin-top: 50px; 
            transition: background-color 0.3s; 
        }
        button { padding: 15px 30px; font-size: 18px; border-radius: 8px; background: #007bff; color: white; border: none; cursor: pointer; }
        #log { margin-top: 30px; color: #555; font-size: 14px; padding: 0 20px; word-wrap: break-word; }
        .error { color: red; font-weight: bold; }
        
        #heartRateDisplay { margin-top: 30px; font-size: 3rem; }

        body.connected {
            background-color: black;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        
        body.connected .ui-element { display: none; }

        body.connected #heartRateDisplay {
            color: white;
            font-size: 35vw;
            margin: 0;
            line-height: 1;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2 class="ui-element">BLE Heart Rate Monitor</h2>
    <button id="connectBtn" class="ui-element">Connect to Watch</button>
    <p id="log" class="ui-element">Ready to connect...</p>
    
    <h1 id="heartRateDisplay">--</h1>

    <script>
        const logElement = document.getElementById('log');
        let bluetoothDevice;
        let heartbeatTimeout;

        function log(message, isError = false) {
            logElement.innerText = message;
            if (isError) logElement.classList.add('error');
            else logElement.classList.remove('error');
        }

        // This function resets the UI when connection is lost
        function handleDisconnect() {
            clearTimeout(heartbeatTimeout);
            document.body.classList.remove('connected');
            document.getElementById('heartRateDisplay').innerText = '--';
            log('❌ Connection lost or timed out. Ready to reconnect.', true);
        }

        // This restarts our 3-second doom timer
        function resetTimeout() {
            clearTimeout(heartbeatTimeout);
            heartbeatTimeout = setTimeout(() => {
                // If 3 seconds pass, force disconnect
                if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                    bluetoothDevice.gatt.disconnect();
                }
            }, 3000);
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                log('1. Waiting for you to select the watch...');
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['heart_rate'] }]
                });

                // Listen for native disconnects (like walking out of range or our 3-second timeout)
                bluetoothDevice.addEventListener('gattserverdisconnected', handleDisconnect);

                log('2. Connecting to Bluetooth server...');
                const server = await bluetoothDevice.gatt.connect();

                log('3. Requesting Heart Rate data...');
                const service = await server.getPrimaryService('heart_rate');
                const characteristic = await service.getCharacteristic('heart_rate_measurement');

                log('4. Starting live notifications...');
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleHeartRate);
                
                log('✅ Success! Listening for heartbeats...');
                document.body.classList.add('connected');
                
                // Start the timer immediately upon successful connection
                resetTimeout();

            } catch (error) {
                log('❌ Error: ' + error.message, true);
            }
        });

        function handleHeartRate(event) {
            // We got a heartbeat! Reset the 3-second timer.
            resetTimeout();

            const value = event.target.value;
            const flags = value.getUint8(0);
            const is16Bit = flags & 0x01;
            
            let heartRate;
            if (is16Bit) {
                heartRate = value.getUint16(1, true); 
            } else {
                heartRate = value.getUint8(1);
            }
            
            document.getElementById('heartRateDisplay').innerText = heartRate;
        }
    </script>
</body>
</html>
