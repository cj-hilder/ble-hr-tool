<!DOCTYPE html>
<html>
<head>
    <title>Autonomic HR Pacer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setupUI">
        <h2>Autonomic HR Pacer</h2>
        <button id="connectBtn">Connect to HR monitor</button>
        <p id="log">Ready to connect...</p>
        <a id="aboutLink" href="about.html">About</a>
    </div>
    
    <div id="trainingUI">
        <h1 id="heartRateDisplay">--</h1>
        
        <div id="stateIndicatorContainer">
            <div id="stateIndicator" class="state-dot stopped"></div>
            <canvas id="hrGraphCanvas" width="90" height="120"></canvas>
            <svg id="speedometerSVG" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <line id="speedoNeedle" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <path id="speedoArc" fill="none" stroke="white" stroke-linecap="round"/>
            </svg>
        </div>
        <div id="stateDescription"></div>
        
        <div id="restStatsContainer" class="timers-row" style="margin-bottom: 1vh;">
            <div class="stat-block">
                <div id="maxHrDisplay">--</div>
                <div class="timer-label">MAX HR</div>
            </div>
            <div class="stat-block">
                <div id="lagDisplay">--</div>
                <div class="timer-label">LAG</div>
            </div>
        </div>

        <div id="timersContainer">
            <div class="timers-row">
                <div class="timer-block">
                    <div id="stateTimerDisplay">00:00</div>
                    <div class="timer-label">STATE</div>
                </div>
                <div class="timer-block">
                    <div id="sessionTimerDisplay">00:00</div>
                    <div class="timer-label">SESSION</div>
                </div>
            </div>
            
            <div class="timers-row">
                <div class="timer-block">
                    <div id="totalActiveTimerDisplay">00:00</div>
                    <div class="timer-label">ACTIVE TOTAL</div>
                </div>
            </div>
        </div>

        <div id="actionButtonsContainer">
            <button id="manualResetBtn" style="display: none;">&#8634;</button>
            <button id="toggleSessionBtn">Start Session</button>
        </div>
    </div>

    <!-- Pause / End / Cancel modal -->
    <div id="sessionModal">
        <div id="sessionModalBox">
            <p>What do you want to do?</p>
            <button class="modal-btn" id="modalPauseBtn">Pause</button>
            <button class="modal-btn" id="modalEndBtn">End session</button>
            <button class="modal-btn" id="modalCancelBtn">Cancel</button>
        </div>
    </div>

    <button id="homeBtn" style="display:none;">&#8962;</button>

    <script src="settings.js"></script>
    <script src="app.js?v=2"></script>
</body>
    </html>
