<!DOCTYPE html>
<html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manawa Pace ľ HR Pacing for Dysautonomia & ME/CFS</title>
    <meta name="description" content="Free heart rate pacing app for dysautonomia, POTS, ME/CFS, Long COVID & Post-Concussion. Connect a Bluetooth chest strap. Measure. Pace. Recover.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Canonical -->
    <link rel="canonical" href="https://manawapace.app/">

    <!-- Open Graph -->
    <meta property="og:title" content="Manawa Pace ľ HR Pacing for Dysautonomia & ME/CFS">
    <meta property="og:description" content="Free heart rate pacing app for dysautonomia, POTS, ME/CFS, Long COVID & Post-Concussion. Connect a Bluetooth chest strap. Measure. Pace. Recover.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://manawapace.app/">
    <meta property="og:image" content="https://manawapace.app/icon.png">

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Manawa Pace",
      "description": "Heart rate pacing app for people with dysautonomia, POTS, ME/CFS, Long COVID, and Post-Concussion Syndrome. Visualise HR patterns, pace exercise safely, and protect against post-exertional malaise. Free and open source.",
      "applicationCategory": "HealthApplication",
      "operatingSystem": ["Android", "Windows", "macOS", "Linux"],
      "url": "https://manawapace.app/",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="summary.css">
</head>
<body>

    <div id="setupUI">
        <img src="icon.png" alt="Manawa Pace logo" />
        <h2>Manawa Pace</h2>
        <p class="app-tagline">Measure. Pace. Recover.</p>
        <button id="connectBtn">Connect to HR monitor</button>
        <p id="log">Ready to connect...</p>
        <div id="setupLinks">
            <a href="quick_start_guide.html">Quick Start Guide</a><br />
            <a href="about.html">Documentation</a><br />
            <a href="history.html">Session History</a>
        </div>
    </div>
    
    <div id="trainingUI">
        <h1 id="heartRateDisplay">--</h1>
        
        <div id="stateIndicatorContainer">
            <div id="stateIndicator" class="state-dot stopped"></div>
            <canvas id="hrGraphCanvas" width="90" height="120"></canvas>
            <svg id="speedometerSVG" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <line id="speedoNeedle" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <path id="speedoArc" fill="none" stroke="white" stroke-linecap="round"/>
            </svg>
        </div>
        <div id="stateDescription"></div>
        <div id="coherenceDisplay" style="display:none;">
            <div id="coherenceRow">
                <span class="coherence-label"></span>
                <span id="coherenceValue" class="coherence-value">--%</span>
            </div>
            <div id="rfbProgress" style="display:none;">
                <svg width="48" height="48" viewBox="0 0 48 48">
                    <!-- Track ring -->
                    <circle cx="24" cy="24" r="20" fill="none"
                        stroke="#1a3a5c" stroke-width="4"/>
                    <!-- Progress arc ÔÇö stroke-dasharray=125.66 (2¤Ç├Ś20), dashoffset animated by JS -->
                    <circle id="rfbProgressArc" cx="24" cy="24" r="20" fill="none"
                        stroke="#1a7fff" stroke-width="4"
                        stroke-linecap="round"
                        stroke-dasharray="125.66"
                        stroke-dashoffset="125.66"
                        transform="rotate(-90 24 24)"/>
                </svg>
            </div>
        </div>
        
        <div id="restStatsContainer" class="timers-row" style="margin-bottom: 1vh;">
            <div class="stat-block">
                <div id="maxHrDisplay">--</div>
                <div class="timer-label">MAX HR</div>
            </div>
            <div class="stat-block">
                <div id="lagDisplay">--</div>
                <div class="timer-label">RECOVERY LAG</div>
            </div>
        </div>

        <div id="timersContainer">
            <div class="timers-row">
                <div class="timer-block" id="stateTimerBlock">
                    <div id="stateTimerDisplay">00:00</div>
                    <div class="timer-label">STATE</div>
                </div>
                <div class="timer-block">
                    <div id="sessionTimerDisplay">00:00</div>
                    <div class="timer-label">SESSION</div>
                </div>
            </div>
            <div class="timers-row">
                <div class="timer-block" id="activeTotalTimerBlock">
                    <div style="display:flex; align-items:baseline; justify-content:center;">
                        <div id="totalActiveTimerDisplay">00:00</div><span id="targetTimerIcon" style="display:none; font-size:0.45em; margin-left:4px; line-height:1;">­ľúá</span>
                    </div>
                    <div class="timer-label" id="activeTotalLabel">ACTIVE TOTAL</div>
                </div>
            </div>
        </div>

        <div id="actionButtonsContainer">
            <button id="manualResetBtn" style="display: none;">&#8634;</button>
            <button id="toggleSessionBtn">Start Session</button>
        </div>
        <div id="activityDisplay"></div>
    </div>

    <!-- Activity selection modal -->
    <div id="activitySelectModal">
        <div id="activitySelectBox">
            <h3>Choose Activity</h3>
            <select id="activitySelectDropdown"></select>
            <div id="activitySelectDesc"></div>
            <div id="activitySelectActions">
                <button id="activitySelectCancelBtn">Cancel</button>
                <button id="activitySelectStartBtn">Start</button>
            </div>
        </div>
    </div>

    <!-- Resonance Breathing time-up modal -->
    <div id="rbTimeUpModal">
        <div id="rbTimeUpModalBox">
            <p>Your resonance breathing time is up.</p>
            <button class="modal-btn" id="rbTimeUpEndBtn">End session</button>
            <button class="modal-btn" id="rbTimeUpExtendBtn">Extend session</button>
        </div>
    </div>

    <!-- Pause / End / Cancel modal -->
    <div id="sessionModal">
        <div id="sessionModalBox">
            <p>What do you want to do?</p>
            <button class="modal-btn" id="modalPauseBtn">Pause</button>
            <button class="modal-btn" id="modalEndBtn">End session</button>
            <button class="modal-btn" id="modalCancelBtn">Cancel</button>
        </div>
    </div>

    <!-- Session Summary modal -->
    <div id="summaryModal">
        <div id="summaryModalBox">
            <h2 class="summary-title">Session Summary</h2>

            <!-- Summary tile injected here by showSummaryModal() via SummaryCard.buildCardHTML() -->
            <div id="summaryCardContainer"></div>

            <textarea id="summaryNotes" placeholder="Notes (optional)ÔÇŽ" rows="3"></textarea>

            <div id="summaryError"></div>

            <div id="summaryActions">
                <button id="summaryDiscardBtn">Discard</button>
                <button id="summarySaveBtn">Save session</button>
            </div>
        </div>
    </div>

    <button id="homeBtn" style="display:none;">&#8962;</button>

    <script src="utils.js"></script>
    <script src="summary.js"></script>
    <script src="settings.js"></script>
    <script src="app.js?v=4"></script>
</body>
</html>
