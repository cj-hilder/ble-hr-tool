<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About – Dysautonomia HR Pacer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #222222;
            --text: #e8e8e8;
            --muted: #666666;
            --accent: #4af;
            --accent-dim: rgba(68, 170, 255, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            line-height: 1.7;
            min-height: 100vh;
        }

        /* ── Top bar ── */
        header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(10,10,10,0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1.5rem;
        }

        header a.back {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        header a.back:hover { opacity: 1; }

        header a.back::before {
            content: '← ';
        }

        header .title {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-left: auto;
        }

        /* ── Main content ── */
        main {
            max-width: 680px;
            margin: 0 auto;
            padding: 3rem 1.5rem 6rem;
            animation: fadeUp 0.4s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Markdown styles ── */
        #readme h1 {
            font-family: 'DM Mono', monospace;
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: #fff;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.6rem;
            margin-bottom: 1.5rem;
            margin-top: 0;
        }

        #readme h2 {
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-top: 2.5rem;
            margin-bottom: 0.75rem;
        }

        #readme h3 {
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            font-weight: 400;
            color: #bbb;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }

        #readme p {
            margin-bottom: 1rem;
            font-size: 0.95rem;
            color: #ccc;
        }

        #readme a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid rgba(68,170,255,0.3);
            transition: border-color 0.2s;
        }

        #readme a:hover {
            border-color: var(--accent);
        }

        #readme ul, #readme ol {
            padding-left: 1.4rem;
            margin-bottom: 1rem;
        }

        #readme li {
            font-size: 0.95rem;
            color: #ccc;
            margin-bottom: 0.3rem;
        }

        #readme code {
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.15em 0.45em;
            border-radius: 3px;
            color: #adf;
        }

        #readme pre {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.1rem 1.2rem;
            overflow-x: auto;
            margin-bottom: 1.2rem;
        }

        #readme pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 0.82rem;
            color: #cde;
        }

        #readme blockquote {
            border-left: 2px solid var(--accent);
            margin: 0 0 1rem;
            padding: 0.5rem 0 0.5rem 1.2rem;
            background: var(--accent-dim);
            border-radius: 0 4px 4px 0;
        }

        #readme blockquote p {
            margin: 0;
            color: #aaa;
            font-style: italic;
        }

        #readme hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2rem 0;
        }

        #readme table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.2rem;
            font-size: 0.88rem;
        }

        #readme th {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            text-align: left;
        }

        #readme td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid #1a1a1a;
            color: #bbb;
        }

        /* ── Loading / error states ── */
        #status {
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 0.05em;
            padding: 3rem 0;
            text-align: center;
        }

        #status.error {
            color: #f66;
        }
    </style>
</head>
<body>

    <header>
        <a class="back" href="index.html">Home</a>
        <span class="title">About</span>
    </header>

    <main>
        <div id="status">Loading…</div>
        <div id="readme"></div>
    </main>

    <script>
        fetch('README.md')
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.text();
            })
            .then(text => {
                document.getElementById('status').style.display = 'none';
                document.getElementById('readme').innerHTML = marked.parse(text);
            })
            .catch(err => {
                const s = document.getElementById('status');
                s.className = 'error';
                s.textContent = `Could not load README.md — ${err.message}`;
            });
    </script>

</body>
</html>
